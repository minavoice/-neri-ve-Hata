<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MINAVOICE | BİLDİRİM MERKEZİ</title>
    <style>
        :root {
            --bg: #0b0e14;
            --card: #161b22;
            --primary: linear-gradient(135deg, #ff8a00, #e52e71);
            --gold: #fcc419;
            --white: #ffffff;
            --gray: #8b949e;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg);
            color: var(--white);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .container { width: 100%; max-width: 450px; }

        .header {
            background: var(--primary);
            padding: 30px 20px;
            border-radius: 24px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(229, 46, 113, 0.3);
            margin-bottom: 25px;
        }
        .header h1 { margin: 0; font-size: 24px; text-transform: uppercase; font-weight: 900; letter-spacing: 2px; }
        .header p { margin: 8px 0 0; font-size: 13px; font-weight: 600; opacity: 0.9; }

        .form-card {
            background: var(--card);
            padding: 25px;
            border-radius: 24px;
            border: 1px solid #30363d;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }

        .form-group { margin-bottom: 18px; }
        
        label {
            display: block;
            color: var(--gold);
            font-size: 11px;
            font-weight: 900;
            text-transform: uppercase;
            margin-bottom: 8px;
            letter-spacing: 0.5px;
        }

        input, select, textarea {
            width: 100%;
            padding: 12px 15px;
            background: rgba(0,0,0,0.3);
            border: 1px solid #30363d;
            border-radius: 12px;
            color: white;
            font-size: 14px;
            box-sizing: border-box;
            outline: none;
            transition: 0.3s;
        }

        input:focus, select:focus, textarea:focus {
            border-color: #ff8a00;
        }

        /* DOSYA ALANI */
        input[type="file"] {
            padding: 10px;
            background: rgba(255, 255, 255, 0.05);
            border: 2px dashed #30363d;
            cursor: pointer;
            font-size: 12px;
        }

        .btn {
            width: 100%;
            padding: 16px;
            background: var(--primary);
            border: none;
            border-radius: 50px;
            color: white;
            font-weight: 900;
            font-size: 14px;
            text-transform: uppercase;
            cursor: pointer;
            box-shadow: 0 8px 20px rgba(229, 46, 113, 0.3);
            margin-top: 10px;
            transition: 0.3s;
        }

        .btn:hover { transform: translateY(-2px); box-shadow: 0 12px 25px rgba(229, 46, 113, 0.5); }

        .footer { text-align: center; margin-top: 35px; font-size: 11px; color: var(--gray); font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>MINAVOICE</h1>
        <p>GELİŞTİRME & HATA BİLDİRİMİ</p>
    </div>

    <div class="form-card">
        <form action="https://formspree.io/f/xbdzyown" method="POST" enctype="multipart/form-data">
            
            <div class="form-group">
                <label>Kullanıcı ID / İsim</label>
                <input type="text" name="user_id" placeholder="Örn: 123456" required>
            </div>

            <div class="form-group">
                <label>Bildirim Türü</label>
                <select name="category" required>
                    <option value="Uygulama Tavsiyesi">💡 Uygulama Tavsiyesi</option>
                    <option value="Hata Bildirimi">🛠️ Hata / Bug Bildirimi</option>
                </select>
            </div>

            <div class="form-group">
                <label>Açıklamanız</label>
                <textarea name="message" rows="5" placeholder="Lütfen detayları yazın..." required></textarea>
            </div>

            <div class="form-group">
                <label>Ekran Görüntüsü / Video (Opsiyonel)</label>
                <input type="file" name="attachment" accept="image/*,video/*">
            </div>

            <button type="submit" class="btn">GÖNDER</button>
        </form>
    </div>

    <div class="footer">MINAV
